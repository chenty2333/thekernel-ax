name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      axtask_registry_ready:
        description: Run the real registry-only thekernel-axtask publish dry-run
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly-2025-05-20
          components: rustfmt
      - name: Formatting, registry graph, and provenance
        run: |
          cargo +nightly-2025-05-20 fmt --all -- --check
          python3 scripts/check_registry_dependencies.py
          scripts/check-provenance.sh

  axsched-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly-2025-05-20
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.76.0
          components: clippy
          targets: riscv64gc-unknown-none-elf,loongarch64-unknown-none
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test unpacked axsched artifact at MSRV
        run: scripts/test-axsched-msrv.sh

  axfault-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.85.0
          components: clippy
          targets: riscv64gc-unknown-none-elf,loongarch64-unknown-none
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test, lint, document, package, and cross-check axfault
        run: |
          cargo +1.85.0 test -p thekernel-axfault --all-targets --locked
          cargo +1.85.0 test -p thekernel-axfault --doc --locked
          cargo +1.85.0 clippy -p thekernel-axfault --all-targets --locked -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo +1.85.0 doc -p thekernel-axfault --no-deps --locked
          cargo +1.85.0 check -p thekernel-axfault --locked --target riscv64gc-unknown-none-elf
          cargo +1.85.0 check -p thekernel-axfault --locked --target loongarch64-unknown-none
          scripts/package-unpack-original.sh thekernel-axfault

  axtlb-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.85.0
          components: clippy
          targets: riscv64gc-unknown-none-elf,loongarch64-unknown-none
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test, lint, document, package, and cross-check axtlb
        run: |
          cargo +1.85.0 test -p thekernel-axtlb --all-targets --locked
          cargo +1.85.0 test -p thekernel-axtlb --doc --locked
          cargo +1.85.0 clippy -p thekernel-axtlb --all-targets --locked -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo +1.85.0 doc -p thekernel-axtlb --no-deps --locked
          cargo +1.85.0 check -p thekernel-axtlb --locked --target riscv64gc-unknown-none-elf
          cargo +1.85.0 check -p thekernel-axtlb --locked --target loongarch64-unknown-none
          scripts/package-unpack-original.sh thekernel-axtlb

  axpoll-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.85.0
          components: clippy
          targets: riscv64gc-unknown-none-elf,loongarch64-unknown-none
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test, lint, document, and cross-check axpoll
        run: |
          cargo +1.85.0 test -p thekernel-axpoll --all-targets --locked
          cargo +1.85.0 clippy -p thekernel-axpoll --all-targets --locked -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo +1.85.0 doc -p thekernel-axpoll --no-deps --locked
          cargo +1.85.0 check -p thekernel-axpoll --locked --target riscv64gc-unknown-none-elf
          cargo +1.85.0 check -p thekernel-axpoll --locked --target loongarch64-unknown-none

  axtask-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: nightly-2025-05-20
          components: clippy,rustfmt
          targets: riscv64gc-unknown-none-elf,loongarch64-unknown-none
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test axtask feature and architecture matrix
        run: |
          features='multitask irq preempt smp sched-cfs task-ext irq-continuation-diagnostics irq-exit'
          test_features='test multitask irq preempt smp sched-cfs task-ext irq-continuation-diagnostics irq-exit'
          cargo +nightly-2025-05-20 check -p thekernel-axtask --no-default-features --locked
          cargo +nightly-2025-05-20 test -p thekernel-axtask --all-targets --locked --features "$test_features"
          cargo +nightly-2025-05-20 clippy -p thekernel-axtask --all-targets --locked --features "$test_features" -- -D warnings
          RUSTDOCFLAGS='-D warnings' cargo +nightly-2025-05-20 doc -p thekernel-axtask --no-deps --locked --features "$features"
          for scheduler in sched-fifo sched-rr sched-cfs; do
            cargo +nightly-2025-05-20 check -p thekernel-axtask --locked --features "multitask irq preempt smp task-ext $scheduler"
          done
          for target in riscv64gc-unknown-none-elf loongarch64-unknown-none; do
            cargo +nightly-2025-05-20 check -p thekernel-axtask --locked --target "$target" --features "$features"
          done
      - name: Test unpacked release artifacts
        env:
          CARGO_TOOLCHAIN: nightly-2025-05-20
          AXTASK_REGISTRY_READY: ${{ github.event_name == 'workflow_dispatch' && inputs.axtask_registry_ready && '1' || '0' }}
        run: |
          scripts/publish-dry-run.sh
          scripts/package-unpack.sh
